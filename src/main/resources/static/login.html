<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nidaa — Sign In</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --blue: #1d4ed8; --green: #059669; --bg: #f0fdf4; --dark: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, rgba(29,78,216,.06) 0%, #f0fdf4 50%, rgba(5,150,105,.1) 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px 16px; color: var(--dark); }

        .logo-wrap { text-align: center; margin-bottom: 28px; }
        .logo-wrap img { height: 80px; width: auto; }

        .card-wrap { max-width: 440px; width: 100%; margin: 0 auto; }
        .card-header { text-align: center; margin-bottom: 28px; }
        .card-header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
        .card-header p { color: var(--muted); font-size: 15px; }

        .card { background: white; border-radius: 20px; padding: 36px; box-shadow: 0 8px 40px rgba(0,0,0,.08); border: 1px solid var(--border); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
        input[type="email"], input[type="password"], input[type="text"], input[type="tel"] {
            width: 100%; padding: 12px 44px 12px 42px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 15px; font-family: 'Inter', sans-serif; color: var(--dark);
            outline: none; transition: border-color .2s, box-shadow .2s;
            background: white;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,78,216,.1); }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; }
        .toggle-pw:hover { color: var(--blue); }
        .forgot-row { display: flex; justify-content: space-between; align-items: center; }
        .forgot-row label { margin-bottom: 0; }
        .forgot { font-size: 14px; color: var(--blue); font-weight: 600; }
        .forgot:hover { text-decoration: underline; }

        .btn-full { width: 100%; padding: 13px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; font-family: 'Inter', sans-serif; margin-top: 8px; }
        .btn-full:hover { background: #1e40af; }
        .btn-full:disabled { background: #93c5fd; cursor: not-allowed; }

        /* Fixed divider - lines no longer overlap text */
        .divider {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin: 20px 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            white-space: nowrap;
        }

        .btn-outline-full { width: 100%; padding: 13px; background: transparent; color: var(--dark); border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
        .btn-outline-full:hover { border-color: var(--blue); color: var(--blue); background: rgba(29,78,216,.03); }

        .alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--green); }
        .alert.show { display: block; }

        .footer-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
        .footer-link a { color: var(--blue); font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) { .card { padding: 24px; } }
    </style>
</head>
<body>

<div class="logo-wrap">
    <a href="index.html"><img src="nidaa-logo-nobg.jpg" alt="Nidaa" /></a>
</div>

<div class="card-wrap">
    <div class="card-header">
        <h1>Sign in to your account</h1>
        <p>Welcome back to the Nidaa community</p>
    </div>
    <div class="card">
        <div class="alert alert-error" id="errorAlert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <span class="input-icon">&#9993;</span>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>
            </div>

            <div class="form-group">
                <div class="forgot-row">
                    <label for="password">Password</label>
                    <a href="forgot-password.html" class="forgot">Forgot password?</a>
                </div>
                <div class="input-wrap">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" id="password" placeholder="••••••••" required />
                    <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">&#128065;</button>
                </div>
            </div>

            <button type="submit" class="btn-full" id="signInBtn">Sign In</button>
        </form>

        <div class="divider"><span>New to Nidaa?</span></div>
        <a href="register.html"><button class="btn-outline-full">Create an account</button></a>
    </div>

    <p class="footer-link">By signing in, you agree to our <a href="Terms.html" target="_blank">Terms of Service</a> and <a href="Privacy.html" target="_blank">Privacy Policy</a>.</p>
</div>

<script>
    const API = 'http://localhost:8081/api';

    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁'; }
    }

    function showError(msg) {
        const el = document.getElementById('errorAlert');
        el.textContent = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('signInBtn');

        if (!email || !password) { showError('Please fill in all fields.'); return; }

        btn.disabled = true; btn.textContent = 'Signing in...';

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Invalid email or password.');

            // Save ALL user fields correctly so every page shows the right name
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify({
                id:       data.userId,
                email:    data.email,
                fullName: data.fullName,   // ← this is what every page reads
                role:     data.role,
                isActive: data.isActive
            }));

            window.location.href = 'dashboard.html';
        } catch (err) {
            showError(err.message);
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    });

    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

</script>
</body>
</html>
