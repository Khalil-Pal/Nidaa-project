<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nidaa — Help Requests</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--blue:#1d4ed8;--green:#059669;--bg:#f0fdf4;--dark:#1e293b;--muted:#64748b;--border:#e2e8f0;--sidebar-w:256px}
        body{font-family:'Inter',sans-serif;color:var(--dark);background:#f8fafc;display:flex;min-height:100vh}
        .sidebar{width:var(--sidebar-w);min-height:100vh;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .3s}
        .sidebar-logo{height:64px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border)}
        .sidebar-logo img{height:40px}
        .sidebar-nav{flex:1;padding:12px 8px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;text-decoration:none;margin-bottom:2px}
        .nav-item i{width:18px;text-align:center;font-size:15px}
        .nav-item:hover,.nav-item.active{background:#eff6ff;color:var(--blue)}
        .sidebar-user{padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
        .user-info .name{font-size:14px;font-weight:600}
        .user-info .role{font-size:12px;color:var(--muted)}
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
        .topbar{height:64px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
        .search-wrap{flex:1;max-width:400px;position:relative}
        .search-wrap input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
        .search-wrap input:focus{border-color:var(--blue)}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
        .topbar-actions{display:flex;align-items:center;gap:12px}
        .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:700;background:#eff6ff;color:var(--blue)}
        .btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
        .btn-logout:hover{color:#dc2626}
        .menu-toggle{display:none;background:none;border:none;font-size:22px;cursor:pointer}
        .content{padding:24px;flex:1}
        .page-header{margin-bottom:20px}
        .page-header h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
        .page-header p{color:var(--muted);font-size:14px}
        .filter-bar{background:white;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .filter-bar select,.filter-bar input[type="text"]{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--dark);outline:none;font-family:'Inter',sans-serif;transition:border-color .2s;background:white}
        .filter-bar select:focus,.filter-bar input:focus{border-color:var(--blue)}
        .filter-search{flex:1;min-width:180px}
        .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .req-card{background:white;border-radius:14px;border:1px solid var(--border);padding:20px;transition:all .2s;display:flex;flex-direction:column;gap:12px}
        .req-card:hover{box-shadow:0 8px 24px rgba(29,78,216,.1);transform:translateY(-2px);border-color:var(--blue)}
        .card-badges{display:flex;gap:8px;flex-wrap:wrap}
        .tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700}
        .tag-medical{background:#fef2f2;color:#dc2626}
        .tag-food{background:#fefce8;color:#a16207}
        .tag-shelter{background:#f0fdf4;color:var(--green)}
        .tag-water{background:#eff6ff;color:var(--blue)}
        .tag-psychological{background:#faf5ff;color:#7c3aed}
        .tag-clothing{background:#fff7ed;color:#c2410c}
        .tag-other{background:#f1f5f9;color:var(--muted)}
        .urgency-critical{background:#fef2f2;color:#dc2626}
        .urgency-high{background:#fff7ed;color:#ea580c}
        .urgency-medium{background:#fefce8;color:#a16207}
        .urgency-low{background:#f0fdf4;color:var(--green)}
        .status-pending{background:#fefce8;color:#a16207}
        .status-assigned{background:#eff6ff;color:var(--blue)}
        .status-completed{background:#f0fdf4;color:var(--green)}
        .status-cancelled{background:#fef2f2;color:#dc2626}
        .card-title{font-size:16px;font-weight:700;color:var(--dark)}
        .card-desc{font-size:14px;color:var(--muted);line-height:1.5}
        .card-meta{display:flex;gap:16px;font-size:13px;color:var(--muted)}
        .card-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px}
        .card-date{font-size:13px;color:var(--muted)}
        .btn-action{padding:8px 16px;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif}
        .btn-accept{background:var(--green)}.btn-accept:hover{background:#047857}
        .btn-view{background:var(--blue)}.btn-view:hover{background:#1e40af}
        .empty-state{text-align:center;padding:64px 24px;color:var(--muted)}
        .empty-icon{font-size:48px;margin-bottom:16px}
        .empty-state h3{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px}
        .fab{position:fixed;bottom:32px;right:32px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 8px 24px rgba(29,78,216,.35);transition:all .2s;z-index:200;display:flex;align-items:center;justify-content:center}
        .fab:hover{background:#1e40af;transform:scale(1.08)}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
        .overlay.open{opacity:1;pointer-events:all}
        .modal{background:white;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(20px);transition:transform .25s}
        .overlay.open .modal{transform:translateY(0)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .modal-header h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800}
        .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
        .form-group{margin-bottom:16px}
        label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
        input[type="text"],textarea,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:var(--dark);outline:none;transition:border-color .2s;background:white}
        input:focus,textarea:focus,select:focus{border-color:var(--blue)}
        textarea{resize:vertical;min-height:90px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .btn-submit{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;margin-top:8px}
        .btn-submit:hover{background:#1e40af}
        .btn-submit:disabled{background:#93c5fd;cursor:not-allowed}
        @media(max-width:900px){.cards-grid{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-toggle{display:block}}
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <a href="dashboard.html"><img src="nidaa-logo.png" alt="Nidaa"/></a>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
        <a href="dashboard.html" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="help-requests.html" class="nav-item active"><i class="fa fa-hand-holding-heart"></i> Help Requests</a>
        <a href="psychological.html" class="nav-item"><i class="fa fa-brain"></i> Psychological Support</a>
        <a href="settings.html" class="nav-item"><i class="fa fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
            <div class="name" id="sidebarName">—</div>
            <div class="role" id="sidebarRole">—</div>
        </div>
    </div>
</aside>

<div class="main">
    <header class="topbar">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa fa-bars"></i></button>
        <div class="search-wrap">
            <i class="search-icon fa fa-magnifying-glass"></i>
            <input type="text" id="searchBar" placeholder="Search requests..." oninput="filterCards()"/>
        </div>
        <div class="topbar-actions">
            <span id="topbarName">—</span>
            <span class="badge" id="topbarRole">—</span>
            <button class="btn-logout" onclick="logout()" title="Logout"><i class="fa fa-right-from-bracket"></i></button>
        </div>
    </header>

    <main class="content">
        <div class="page-header">
            <h1 id="pageTitle">Help Requests</h1>
            <p id="pageDesc">Loading...</p>
        </div>

        <div class="filter-bar">
            <select id="filterStatus" onchange="filterCards()">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="COMPLETED">Completed</option>
            </select>
            <select id="filterType" onchange="filterCards()">
                <option value="">All Types</option>
                <option value="MEDICAL">Medical</option>
                <option value="FOOD">Food</option>
                <option value="SHELTER">Shelter</option>
                <option value="WATER">Water</option>
                <option value="CLOTHING">Clothing</option>
            </select>
            <input type="text" class="filter-search" id="filterSearch" placeholder="Search..." oninput="filterCards()"/>
        </div>

        <div class="cards-grid" id="cardsGrid">
            <div style="text-align:center;padding:48px;color:#64748b;grid-column:1/-1">
                <i class="fa fa-spinner fa-spin" style="font-size:24px;margin-bottom:12px;display:block"></i>
                Loading...
            </div>
        </div>
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">📭</div>
            <h3>No requests found</h3>
            <p>Try adjusting your filters.</p>
        </div>
    </main>
</div>

<!-- FAB — only shown for beneficiary -->
<button class="fab" id="fabBtn" onclick="openModal()" title="New Request" style="display:none">+</button>

<!-- MODAL — for beneficiary to submit requests -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-header">
            <h2>Submit a Help Request</h2>
            <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        </div>
        <form id="requestForm">
            <div class="form-group">
                <label>Request Title *</label>
                <input type="text" id="reqTitle" placeholder="e.g. Food needed for 5 people" required/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Type of Help *</label>
                    <select id="reqType" required>
                        <option value="" disabled selected>Select type</option>
                        <option value="MEDICAL">Medical</option>
                        <option value="FOOD">Food</option>
                        <option value="SHELTER">Shelter</option>
                        <option value="WATER">Water</option>
                        <option value="CLOTHING">Clothing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Urgency Level *</label>
                    <select id="reqUrgency" required>
                        <option value="" disabled selected>Select level</option>
                        <option value="CRITICAL">Critical</option>
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="reqDesc" placeholder="Describe your situation and what you need..."></textarea>
            </div>
            <div class="form-group">
                <label>Number of People</label>
                <input type="text" id="reqPeople" placeholder="e.g. 4 adults, 2 children"/>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Submit Request</button>
        </form>
    </div>
</div>

<script>
    const API = 'http://localhost:8081/api';
    function authHeader() { return { 'Authorization': 'Bearer ' + localStorage.getItem('token'), 'Content-Type': 'application/json' }; }
    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'login.html'; }

    if (!localStorage.getItem('token')) window.location.href = 'login.html';

    const user        = JSON.parse(localStorage.getItem('user') || '{}');
    const fullName    = user.fullName || user.name || 'User';
    const firstName   = fullName.split(' ')[0];
    const userRole    = (user.role || 'beneficiary').toLowerCase();
    const roleDisplay = userRole.charAt(0).toUpperCase() + userRole.slice(1);
    const initials    = fullName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

    document.getElementById('sidebarName').textContent   = fullName;
    document.getElementById('sidebarRole').textContent   = roleDisplay;
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('topbarName').textContent    = firstName;
    document.getElementById('topbarRole').textContent    = roleDisplay;

    // Show community link only for volunteer/psychologist
    if (userRole === 'volunteer' || userRole === 'psychologist') {
        const nav = document.getElementById('sidebarNav');
        const communityLink = document.createElement('a');
        communityLink.href = 'community.html';
        communityLink.className = 'nav-item';
        communityLink.innerHTML = '<i class="fa fa-users"></i> Community';
        // Insert before Settings
        const settingsLink = nav.querySelector('a[href="settings.html"]');
        nav.insertBefore(communityLink, settingsLink);
    }

    // Set page text and show FAB based on role
    if (userRole === 'beneficiary') {
        document.getElementById('pageTitle').textContent = 'My Help Requests';
        document.getElementById('pageDesc').textContent  = 'Submit and track your help requests.';
        document.getElementById('fabBtn').style.display  = 'flex';
    } else if (userRole === 'volunteer' || userRole === 'organization') {
        document.getElementById('pageTitle').textContent = 'Available Help Requests';
        document.getElementById('pageDesc').textContent  = 'Browse requests and offer your help.';
    } else if (userRole === 'admin') {
        document.getElementById('pageTitle').textContent = 'All Help Requests';
        document.getElementById('pageDesc').textContent  = 'Manage all platform requests.';
    }

    let allRequests = [];

    const typeTag = {
        MEDICAL:'tag-medical', FOOD:'tag-food', SHELTER:'tag-shelter',
        WATER:'tag-water', CLOTHING:'tag-clothing', PSYCHOLOGICAL:'tag-psychological', OTHER:'tag-other'
    };
    const urgencyTag = {
        CRITICAL:'urgency-critical', HIGH:'urgency-high', MEDIUM:'urgency-medium', LOW:'urgency-low'
    };
    const statusTag = {
        PENDING:'status-pending', ASSIGNED:'status-assigned',
        COMPLETED:'status-completed', CANCELLED:'status-cancelled'
    };

    function formatDate(d) {
        if (!d) return '';
        return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderCards(list) {
        const grid  = document.getElementById('cardsGrid');
        const empty = document.getElementById('emptyState');
        if (!list.length) {
            grid.innerHTML    = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = list.map(r => {
            const type   = (r.helpType   || r.type    || 'OTHER').toUpperCase();
            const urg    = (r.urgencyLevel|| r.urgency || 'MEDIUM').toUpperCase();
            const status = (r.status     || 'PENDING').toUpperCase();
            const title  = r.title       || 'Help Request';
            const desc   = r.description || r.desc    || '';
            const id     = r.requestId   || r.id      || '';
            const date   = formatDate(r.createdAt || r.date);
            const people = r.peopleCount || r.people || '';

            // Action button changes based on role
            let actionBtn = '';
            if (userRole === 'beneficiary') {
                actionBtn = `<button class="btn-action btn-view" onclick="alert('Request #${id}\\nStatus: ${status}\\n${desc}')">Details</button>`;
            } else if ((userRole === 'volunteer' || userRole === 'organization') && status === 'PENDING') {
                actionBtn = `<button class="btn-action btn-accept" onclick="acceptRequest(${id}, this)">Accept</button>`;
            } else {
                actionBtn = `<button class="btn-action btn-view" onclick="alert('Request #${id}\\nStatus: ${status}\\n${desc}')">Details</button>`;
            }

            return `<div class="req-card">
                <div class="card-badges">
                    <span class="tag ${typeTag[type]   || 'tag-other'}">${type}</span>
                    <span class="tag ${urgencyTag[urg] || ''}">${urg}</span>
                    <span class="tag ${statusTag[status] || 'status-pending'}">${status}</span>
                </div>
                <div class="card-title">${title}</div>
                ${desc ? `<div class="card-desc">${desc.substring(0,120)}${desc.length>120?'...':''}</div>` : ''}
                <div class="card-meta">
                    ${people ? `<span><i class="fa fa-users" style="font-size:11px"></i> ${people}</span>` : ''}
                    <span><i class="fa fa-hashtag" style="font-size:11px"></i>${id}</span>
                </div>
                <div class="card-footer">
                    <span class="card-date">${date}</span>
                    ${actionBtn}
                </div>
            </div>`;
        }).join('');
    }

    function filterCards() {
        const status = (document.getElementById('filterStatus').value || '').toUpperCase();
        const type   = (document.getElementById('filterType').value   || '').toUpperCase();
        const search = ((document.getElementById('filterSearch').value || '') + (document.getElementById('searchBar').value || '')).toLowerCase();

        renderCards(allRequests.filter(r => {
            const rType   = (r.helpType    || r.type    || '').toUpperCase();
            const rStatus = (r.status      || '').toUpperCase();
            const rText   = ((r.title || '') + ' ' + (r.description || '')).toLowerCase();
            return (!status || rStatus === status) &&
                (!type   || rType   === type)   &&
                (!search || rText.includes(search));
        }));
    }

    async function loadRequests() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '<div style="text-align:center;padding:48px;color:#64748b;grid-column:1/-1"><i class="fa fa-spinner fa-spin" style="font-size:24px;margin-bottom:12px;display:block"></i>Loading...</div>';
        try {
            // Beneficiary sees only their own requests
            const endpoint = userRole === 'beneficiary' ? '/help-requests/my' : '/help-requests';
            const res  = await fetch(API + endpoint, { headers: authHeader() });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            // Backend wraps in ApiResponse{data:[...]}
            allRequests = Array.isArray(data) ? data : (data.data || data.content || []);
        } catch (e) {
            allRequests = [];
            grid.innerHTML = '<div style="text-align:center;padding:48px;color:#64748b;grid-column:1/-1"><i class="fa fa-triangle-exclamation" style="font-size:28px;margin-bottom:10px;display:block;color:#f59e0b"></i>Could not load requests. Make sure the server is running.</div>';
            return;
        }
        filterCards();
    }

    // Accept a request (for volunteers/organizations)
    async function acceptRequest(id, btn) {
        if (!confirm('Accept this request and mark yourself as the assigned helper?')) return;
        try {
            const res = await fetch(API + '/help-requests/' + id + '/status?status=ASSIGNED', {
                method: 'PUT', headers: authHeader()
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            btn.textContent = '✓ Accepted';
            btn.style.background = '#047857';
            btn.disabled = true;
            // Update local list
            const req = allRequests.find(r => (r.requestId || r.id) == id);
            if (req) req.status = 'ASSIGNED';
        } catch (e) {
            alert('Could not accept request: ' + e.message);
        }
    }

    function openModal()  { document.getElementById('overlay').classList.add('open'); }
    function closeModal() { document.getElementById('overlay').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('requestForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const title       = document.getElementById('reqTitle').value.trim();
        const helpType    = document.getElementById('reqType').value;
        const urgencyLevel= document.getElementById('reqUrgency').value;
        const description = document.getElementById('reqDesc').value.trim();
        const numberOfPeople = document.getElementById('reqPeople').value.trim();

        if (!title)         { alert('Please enter a request title.'); return; }
        if (!helpType)      { alert('Please select the type of help.'); return; }
        if (!urgencyLevel)  { alert('Please select the urgency level.'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        try {
            const res = await fetch(API + '/help-requests', {
                method: 'POST',
                headers: authHeader(),
                body: JSON.stringify({
                    title:        title,
                    helpType:     helpType,
                    urgencyLevel: urgencyLevel,
                    description:  description || title,
                    numberOfPeople: numberOfPeople
                })
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.message || 'Server error ' + res.status);
            }

            const saved = await res.json();
            // saved is ApiResponse{data: HelpRequest}
            const newReq = saved.data || saved;

            // Add to the top of the list and re-render
            allRequests.unshift(newReq);
            filterCards();
            closeModal();
            this.reset();

            // Success toast
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:20px;right:20px;background:#f0fdf4;border:1px solid #bbf7d0;color:#059669;padding:14px 22px;border-radius:12px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.1);font-family:Inter,sans-serif;font-size:14px';
            toast.textContent = '✅ Request saved successfully!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);

        } catch (err) {
            alert('❌ Could not submit: ' + err.message);
        }

        btn.disabled = false;
        btn.textContent = 'Submit Request';
    });

    loadRequests();
</script>
</body>
</html>
