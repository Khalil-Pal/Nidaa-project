<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nidaa — Reset Password</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1d4ed8;--blue-dark:#1e40af;--green:#059669;--bg:#f0fdf4;--dark:#1e293b;--muted:#64748b;--border:#e2e8f0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#eff6ff 0%,var(--bg) 60%,#d1fae5 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 16px;color:var(--dark)}
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap img{height:72px;width:auto}
    .card-wrap{max-width:440px;width:100%;margin:0 auto}
    .card-header{text-align:center;margin-bottom:24px}
    .card-header h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--dark);margin-bottom:7px}
    .card-header p{color:var(--muted);font-size:15px;line-height:1.6}
    .card{background:white;border-radius:22px;padding:38px;box-shadow:0 12px 48px rgba(29,78,216,.1);border:1px solid var(--border)}

    /* Steps indicator */
    .steps-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
    .step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--border);color:var(--muted);transition:all .3s}
    .step-dot.active{background:var(--blue);border-color:var(--blue);color:white}
    .step-dot.done{background:var(--green);border-color:var(--green);color:white}
    .step-line{flex:1;max-width:40px;height:2px;background:var(--border);transition:background .3s}
    .step-line.done{background:var(--green)}

    /* Form */
    .step-panel{display:none}
    .step-panel.active{display:block}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
    .input-wrap{position:relative}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
    input{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--border);border-radius:11px;font-size:15px;font-family:'Inter',sans-serif;color:var(--dark);outline:none;transition:border-color .2s,box-shadow .2s;background:white}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(29,78,216,.1)}
    .input-wrap:focus-within .input-icon{color:var(--blue)}

    /* Code input special style */
    .code-input{text-align:center;font-size:24px;font-weight:800;letter-spacing:12px;padding:16px 14px;font-family:'Plus Jakarta Sans',sans-serif}

    .toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;transition:color .2s}
    .toggle-pw:hover{color:var(--blue)}

    .btn-submit{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px}
    .btn-submit:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,78,216,.3)}
    .btn-submit:disabled{background:#93c5fd;cursor:not-allowed;transform:none;box-shadow:none}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .alert{padding:13px 16px;border-radius:11px;font-size:14px;margin-bottom:18px;display:none;align-items:center;gap:10px}
    .alert.show{display:flex}
    .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
    .alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--green)}

    .footer-link{text-align:center;margin-top:22px;font-size:14px;color:var(--muted)}
    .footer-link a{color:var(--blue);font-weight:600}
    .resend-link{text-align:center;margin-top:14px;font-size:14px;color:var(--muted)}
    .resend-link button{background:none;border:none;color:var(--blue);font-weight:600;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif}
    .resend-link button:hover{text-decoration:underline}
    .hint-text{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}
    @media(max-width:480px){.card{padding:26px}}
  </style>
</head>
<body>

<div class="logo-wrap">
  <a href="index.html"><img src="nidaa-logo-nobg.jpg" alt="Nidaa"/></a>
</div>

<div class="card-wrap">
  <div class="card-header">
    <h1 id="pageTitle">Forgot Password? 🔐</h1>
    <p id="pageSubtitle">Enter your email and we'll send you a reset code.</p>
  </div>
  <div class="card">

    <!-- Steps bar -->
    <div class="steps-bar">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <div class="alert alert-error" id="errorAlert">
      <i class="fa fa-circle-exclamation"></i>
      <span id="alertMsg">Error</span>
    </div>
    <div class="alert alert-success" id="successAlert">
      <i class="fa fa-circle-check"></i>
      <span id="successMsg">Success</span>
    </div>

    <!-- STEP 1: Enter Email -->
    <div class="step-panel active" id="step1">
      <div class="form-group">
        <label><i class="fa fa-envelope"></i> Your Email Address</label>
        <div class="input-wrap">
          <i class="input-icon fa fa-envelope"></i>
          <input type="email" id="emailInput" placeholder="you@example.com" required/>
        </div>
      </div>
      <button class="btn-submit" id="btn1" onclick="sendCode()">
        <i class="fa fa-paper-plane"></i> Send Reset Code
      </button>
    </div>

    <!-- STEP 2: Enter Code -->
    <div class="step-panel" id="step2">
      <div class="form-group">
        <label><i class="fa fa-key"></i> Enter Your Reset Code</label>
        <div class="input-wrap">
          <input type="text" id="codeInput" class="code-input" placeholder="ABC@12" maxlength="6" style="padding-left:14px" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <p class="hint-text">Check your email inbox. The code contains 6 characters (letters, numbers and symbols like @, #, $).</p>
      </div>
      <button class="btn-submit" id="btn2" onclick="verifyCode()">
        <i class="fa fa-check"></i> Verify Code
      </button>
      <div class="resend-link">
        Didn't receive it? <button onclick="resendCode()">Resend code</button>
      </div>
    </div>

    <!-- STEP 3: New Password -->
    <div class="step-panel" id="step3">
      <div class="form-group">
        <label><i class="fa fa-lock"></i> New Password</label>
        <div class="input-wrap">
          <i class="input-icon fa fa-lock"></i>
          <input type="password" id="newPassword" placeholder="Minimum 6 characters"/>
          <button type="button" class="toggle-pw" onclick="togglePw('newPassword',this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa fa-lock"></i> Confirm New Password</label>
        <div class="input-wrap">
          <i class="input-icon fa fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Repeat your new password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword',this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>
      <button class="btn-submit" id="btn3" onclick="resetPassword()">
        <i class="fa fa-shield-halved"></i> Reset Password
      </button>
    </div>

  </div>
  <p class="footer-link"><a href="login.html"><i class="fa fa-arrow-left"></i> Back to Sign In</a></p>
</div>

<script>
  const API = 'http://localhost:8081/api';
  let userEmail = '';

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const ico = btn.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fa fa-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'fa fa-eye'; }
  }

  function showError(msg) {
    const el = document.getElementById('errorAlert');
    document.getElementById('alertMsg').textContent = msg;
    document.getElementById('successAlert').classList.remove('show');
    el.className = 'alert alert-error show';
    setTimeout(() => el.classList.remove('show'), 6000);
  }

  function showSuccess(msg) {
    const el = document.getElementById('successAlert');
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('errorAlert').classList.remove('show');
    el.className = 'alert alert-success show';
  }

  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
            ? '<div class="spinner"></div> Please wait...'
            : text;
  }

  function goToStep(step) {
    document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');

    // Update dots
    for (let i = 1; i <= 3; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.remove('active', 'done');
      if (i < step) { dot.classList.add('done'); dot.innerHTML = '<i class="fa fa-check"></i>'; }
      else if (i === step) { dot.classList.add('active'); dot.textContent = i; }
      else { dot.textContent = i; }
    }
    for (let i = 1; i <= 2; i++) {
      document.getElementById('line' + i).classList.toggle('done', i < step);
    }

    const titles = ['Forgot Password? 🔐', 'Enter Your Code 🔑', 'Set New Password 🔒'];
    const subs = [
      'Enter your email and we\'ll send you a reset code.',
      'We sent a 6-character code to your email.',
      'Almost done! Choose a strong new password.'
    ];
    document.getElementById('pageTitle').textContent = titles[step - 1];
    document.getElementById('pageSubtitle').textContent = subs[step - 1];
  }

  async function sendCode() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showError('Please enter your email address.'); return; }
    setLoading('btn1', true, '<i class="fa fa-paper-plane"></i> Send Reset Code');
    try {
      const res = await fetch(`${API}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      userEmail = email;
      showSuccess(data.message);
      setTimeout(() => goToStep(2), 1000);
    } catch (err) {
      showError(err.message);
    }
    setLoading('btn1', false, '<i class="fa fa-paper-plane"></i> Send Reset Code');
  }

  async function verifyCode() {
    const code = document.getElementById('codeInput').value.trim();
    if (code.length < 6) { showError('Please enter the full 6-character code.'); return; }
    setLoading('btn2', true, '<i class="fa fa-check"></i> Verify Code');
    try {
      const res = await fetch(`${API}/auth/verify-reset-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, code })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showSuccess('Code verified!');
      setTimeout(() => goToStep(3), 800);
    } catch (err) {
      showError(err.message);
    }
    setLoading('btn2', false, '<i class="fa fa-check"></i> Verify Code');
  }

  async function resetPassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const code = document.getElementById('codeInput').value.trim();

    if (newPassword.length < 6) { showError('Password must be at least 6 characters.'); return; }
    if (newPassword !== confirmPassword) { showError('Passwords do not match.'); return; }

    setLoading('btn3', true, '<i class="fa fa-shield-halved"></i> Reset Password');
    try {
      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, code, newPassword })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showSuccess('✅ Password reset successfully! Redirecting to login...');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch (err) {
      showError(err.message);
    }
    setLoading('btn3', false, '<i class="fa fa-shield-halved"></i> Reset Password');
  }

  async function resendCode() {
    if (!userEmail) return;
    try {
      await fetch(`${API}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      showSuccess('New code sent to your email!');
      document.getElementById('codeInput').value = '';
    } catch (err) {
      showError('Could not resend code. Please try again.');
    }
  }
</script>
</body>
</html>
