<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nidaa — Create Account</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--blue:#1d4ed8;--blue-dark:#1e40af;--green:#059669;--bg:#f0fdf4;--dark:#1e293b;--muted:#64748b;--border:#e2e8f0}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#eff6ff 0%,var(--bg) 60%,#d1fae5 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 16px;color:var(--dark)}

        .logo-wrap{text-align:center;margin-bottom:24px}
        .logo-wrap img{height:72px;width:auto;transition:transform .3s}
        .logo-wrap img:hover{transform:scale(1.05)}

        .card-wrap{max-width:500px;width:100%;margin:0 auto}
        .card-header{text-align:center;margin-bottom:24px}
        .card-header h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;color:var(--dark);margin-bottom:7px}
        .card-header p{color:var(--muted);font-size:15px}
        .card{background:white;border-radius:22px;padding:38px;box-shadow:0 12px 48px rgba(29,78,216,.1);border:1px solid var(--border)}

        .form-group{margin-bottom:18px}
        label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
        .input-wrap{position:relative}
        .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
        input[type="text"],input[type="email"],input[type="password"],input[type="tel"],select{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--border);border-radius:11px;font-size:15px;font-family:'Inter',sans-serif;color:var(--dark);outline:none;transition:border-color .2s,box-shadow .2s;background:white}
        select{appearance:none;cursor:pointer}
        input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(29,78,216,.1)}
        .input-wrap:focus-within .input-icon{color:var(--blue)}
        .toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;transition:color .2s}
        .toggle-pw:hover{color:var(--blue)}

        /* ROLE CARDS */
        .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
        .role-card{border:2px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
        .role-card:hover{border-color:var(--blue);background:#f8fbff}
        .role-card input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
        .role-card.selected{border-color:var(--blue);background:#eff6ff}
        .role-card .role-icon{font-size:24px;margin-bottom:6px;display:block}
        .role-card .role-name{font-size:13px;font-weight:700;color:var(--dark);display:block}
        .role-card .role-desc{font-size:11px;color:var(--muted);display:block;margin-top:2px}

        /* PASSWORD STRENGTH */
        .pw-strength{margin-top:8px}
        .pw-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
        .pw-fill{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
        .pw-label{font-size:12px;color:var(--muted);margin-top:4px}

        /* TERMS */
        .terms-row{display:flex;align-items:flex-start;gap:10px;margin:20px 0}
        .terms-row input[type="checkbox"]{width:18px;height:18px;min-width:18px;margin-top:2px;accent-color:var(--blue);cursor:pointer;padding:0}
        .terms-row label{font-size:14px;color:var(--muted);margin-bottom:0;font-weight:400;line-height:1.5;cursor:pointer}
        .terms-row label a{color:var(--blue);font-weight:600}
        .terms-row label a:hover{text-decoration:underline}

        /* BUTTON */
        .btn-submit{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px}
        .btn-submit:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,78,216,.3)}
        .btn-submit:disabled{background:#93c5fd;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-submit .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ALERTS */
        .alert{padding:13px 16px;border-radius:11px;font-size:14px;margin-bottom:18px;display:none;align-items:center;gap:10px;line-height:1.5}
        .alert.show{display:flex}
        .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
        .alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--green)}
        .alert-pending{background:#fffbeb;border:1px solid #fde68a;color:#92400e}

        .footer-link{text-align:center;margin-top:22px;font-size:14px;color:var(--muted)}
        .footer-link a{color:var(--blue);font-weight:600}
        .footer-link a:hover{text-decoration:underline}

        @media(max-width:480px){.card{padding:26px}.role-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="logo-wrap">
    <a href="index.html"><img src="nidaa-logo-nobg.jpg" alt="Nidaa"/></a>
</div>

<div class="card-wrap">
    <div class="card-header">
        <h1>Join Nidaa 🤝</h1>
        <p>Create your account and start making a difference</p>
    </div>
    <div class="card">
        <div class="alert alert-error" id="errorAlert">
            <i class="fa fa-circle-exclamation"></i>
            <span id="alertMsg"></span>
        </div>

        <form id="registerForm" novalidate>

            <!-- Full Name -->
            <div class="form-group">
                <label><i class="fa fa-user"></i> Full Name</label>
                <div class="input-wrap">
                    <i class="input-icon fa fa-user"></i>
                    <input type="text" id="fullName" placeholder="Your full name" required autocomplete="name"/>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label><i class="fa fa-envelope"></i> Email Address</label>
                <div class="input-wrap">
                    <i class="input-icon fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
                </div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label><i class="fa fa-phone"></i> Phone Number <span style="color:var(--muted);font-weight:400;text-transform:none">(optional)</span></label>
                <div class="input-wrap">
                    <i class="input-icon fa fa-phone"></i>
                    <input type="tel" id="phone" placeholder="+1 234 567 8900" autocomplete="tel"/>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label><i class="fa fa-lock"></i> Password</label>
                <div class="input-wrap">
                    <i class="input-icon fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)"/>
                    <button type="button" class="toggle-pw" onclick="togglePw('password',this)">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
                <div class="pw-strength">
                    <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
                    <div class="pw-label" id="pwLabel">Enter a password</div>
                </div>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label><i class="fa fa-id-badge"></i> I am registering as</label>
                <div class="role-grid">
                    <label class="role-card" id="role-beneficiary">
                        <input type="radio" name="role" value="beneficiary" onchange="selectRole('beneficiary')"/>
                        <span class="role-icon">🙏</span>
                        <span class="role-name">Beneficiary</span>
                        <span class="role-desc">I need help</span>
                    </label>
                    <label class="role-card" id="role-volunteer">
                        <input type="radio" name="role" value="volunteer" onchange="selectRole('volunteer')"/>
                        <span class="role-icon">🤝</span>
                        <span class="role-name">Volunteer</span>
                        <span class="role-desc">I want to help</span>
                    </label>
                    <label class="role-card" id="role-psychologist">
                        <input type="radio" name="role" value="psychologist" onchange="selectRole('psychologist')"/>
                        <span class="role-icon">🧠</span>
                        <span class="role-name">Psychologist</span>
                        <span class="role-desc">Mental health support</span>
                    </label>
                    <label class="role-card" id="role-organization">
                        <input type="radio" name="role" value="organization" onchange="selectRole('organization')"/>
                        <span class="role-icon">🏢</span>
                        <span class="role-name">Organization</span>
                        <span class="role-desc">Aid organization</span>
                    </label>
                </div>
            </div>

            <!-- Terms -->
            <div class="terms-row">
                <input type="checkbox" id="terms" required/>
                <label for="terms">
                    I agree to the <a href="Terms.html" target="_blank">Terms of Service</a> and
                    <a href="Privacy.html" target="_blank">Privacy Policy</a>.
                    I understand my data will be used to facilitate humanitarian assistance.
                </label>
            </div>

            <button type="submit" class="btn-submit" id="registerBtn">
                <i class="fa fa-user-plus"></i> Create Account
            </button>
        </form>
    </div>

    <p class="footer-link">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<script>
    const API = 'http://localhost:8081/api';
    let selectedRole = '';

    function selectRole(r) {
        selectedRole = r;
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('role-' + r).classList.add('selected');
    }

    function togglePw(id, btn) {
        const inp = document.getElementById(id);
        const ico = btn.querySelector('i');
        if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fa fa-eye-slash'; }
        else { inp.type = 'password'; ico.className = 'fa fa-eye'; }
    }

    function checkStrength(pw) {
        const fill = document.getElementById('pwFill');
        const label = document.getElementById('pwLabel');
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
        const labels = ['Too weak','Weak','Good','Strong'];
        fill.style.width = (score * 25) + '%';
        fill.style.background = colors[score - 1] || '#e2e8f0';
        label.textContent = score > 0 ? labels[score - 1] : 'Enter a password';
        label.style.color = colors[score - 1] || 'var(--muted)';
    }

    function showAlert(msg, type = 'error') {
        const el = document.getElementById('errorAlert');
        document.getElementById('alertMsg').textContent = msg;
        el.className = `alert alert-${type} show`;
        if (type === 'error') setTimeout(() => el.classList.remove('show'), 6000);
    }

    function setLoading(loading) {
        const btn = document.getElementById('registerBtn');
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Creating account...';
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa fa-user-plus"></i> Create Account';
        }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim() || null;
        const password = document.getElementById('password').value;

        if (!fullName) { showAlert('Please enter your full name.'); return; }
        if (!email) { showAlert('Please enter your email address.'); return; }
        if (!selectedRole) { showAlert('Please select your role.'); return; }
        if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
        if (!document.getElementById('terms').checked) { showAlert('Please agree to the Terms of Service.'); return; }

        setLoading(true);
        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, phone, password, role: selectedRole })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Registration failed. Please try again.');

            if (data.pendingApproval) {
                // Pending: do NOT save token — they cannot log in until approved
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                showAlert(
                    '✅ Application submitted! Your account is under review. You will receive an email at ' + data.email + ' once approved.',
                    'pending'
                );
                document.getElementById('registerBtn').textContent = '✓ Application Submitted';
                document.getElementById('registerBtn').disabled = true;
                return;
            }
            // Active user (beneficiary) — save token and go to dashboard
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify({
                id: data.userId, email: data.email, fullName: data.fullName,
                role: data.role, isActive: data.isActive, pendingApproval: false
            }));
            window.location.href = 'dashboard.html';
        } catch (err) {
            showAlert(err.message);
            setLoading(false);
        }
    });

    if (localStorage.getItem('token')) {
        const u = JSON.parse(localStorage.getItem('user') || '{}');
        if (u.isActive !== false) window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
