# ================================================================
# NIDAA PLATFORM ? APPLICATION CONFIGURATION
# ================================================================

server.port=8081
server.servlet.context-path=/

# ==================== DATABASE ====================
# stringtype=unspecified is CRITICAL ? tells PostgreSQL driver NOT to declare
# the type of string parameters, so it accepts them for enum columns
spring.datasource.url=jdbc:postgresql://localhost:5432/Web_DB?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=newpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==================== JPA / HIBERNATE ====================
# NEVER use "update" with PostgreSQL enums ? it breaks the EntityManager
# "none" = Hibernate does NOT touch the schema at all
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ==================== JWT ====================
jwt.secret=humanitarian-platform-super-secret-key-2024-change-in-production
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.header=Authorization
jwt.prefix=Bearer

# ==================== EMAIL ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=supp0rtnidaa@yandex.ru
spring.mail.password=vnbecpzorwtjscud
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

nidaa.admin.email=supp0rtnidaa@yandex.ru

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.humanitarian.platform=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info